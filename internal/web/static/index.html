<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gi</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/dist/app.bundle.css">
</head>
<body>
  <div id="app"><div style="padding:20px;color:var(--text-secondary,#888)">Loading Gi…</div></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var text = String((error && error.message) || msg || '');
      if (/ResizeObserver loop/i.test(text)) return true;
      document.getElementById('app').innerHTML = '<pre style="padding:20px;color:red;">Error: ' + msg + '\nLine: ' + line + '\n' + url + '</pre>';
      fetch('/api/frontend/log', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entries: [{ ts: new Date().toISOString(), level: 'error', message: String(msg), detail: { url: url, line: line, col: col } }] }) }).catch(function() {});
      return false;
    };
  </script>
  <script src="/js/marked.min.js"></script>
  <script src="/js/vendor/katex.min.js"></script>
  <script src="/js/vendor/beautiful-mermaid.js"></script>
  <script type="importmap">
  {
    "imports": {
      "#editor-vendor/codemirror": "/editor-vendor/codemirror.js?v=1",
      "./vendor/preact-htm.js": "/js/vendor/preact-htm.js?v=1",
      "../vendor/preact-htm.js": "/js/vendor/preact-htm.js?v=1"
    }
  }
  </script>
  <script type="module" src="/dist/app.bundle.js"></script>
</body>
</html>
